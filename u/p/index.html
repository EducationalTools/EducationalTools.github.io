<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../menu.css" />
    <link rel="stylesheet" href="../common.css" />
    <link rel="icon" href="../icon-512.png" sizes="any" />

    <title>EduTools</title>
</head>

<body>
    <div class="loader">Loading...</div>
    <div class="menucontainer hide" onclick="closeMenu()">
        <div class="menu"></div>
    </div>
    <script>!function (w, d, i, s) { function l() { if (!d.getElementById(i)) { var f = d.getElementsByTagName(s)[0], e = d.createElement(s); e.type = "text/javascript", e.async = !0, e.src = "https://canny.io/sdk.js", f.parentNode.insertBefore(e, f) } } if ("function" != typeof w.Canny) { var c = function () { c.q.push(arguments) }; c.q = [], w.Canny = c, "complete" === d.readyState ? l() : w.attachEvent ? w.attachEvent("onload", l) : w.addEventListener("load", l, !1) } }(window, document, "canny-jssdk", "script");</script>

    <div class="sidebar">
        <div class="icnbtn home" onclick="location ='/more/u'">
            <span class="material-symbols-rounded"> home </span>
        </div>
        <div class="icnbtn" onclick="menu('gmae')">
            <span class="material-symbols-rounded"> sports_esports </span>
        </div>
        <div class="icnbtn" onclick="menu('app')">
            <span class="material-symbols-rounded"> apps </span>
        </div>
        <div class="icnbtn" onclick="menu('tool')">
            <span class="material-symbols-rounded"> build </span>
        </div>
        <div class="icnbtn" onclick="window.open('https://inglan2.github.io/SchoolDocs')">
            <span class="material-symbols-rounded"> library_books </span>
        </div>
        <div class="icnbtn" data-canny-changelog>
            <span class="material-symbols-rounded"> notifications </span>
        </div>
        <div class="icnbtn" onclick="menu('more')">
            <span class="material-symbols-rounded"> more_vert </span>
        </div>
    </div>
    <script>
        Canny('initChangelog', {
            appID: '65eae5dcdc0b7bc8257a4736',
            position: 'top',
            align: 'left',
            theme: 'dark',
        });
    </script>
    <div class="player">
        <iframe src="" frameborder="0"></iframe>
        <div class="playersidebar">
            <h1>Loading...</h1>
            <h2></h2>
            <div class="flexgrow"></div>
            <div class="playerctrl">
                <!-- Icon Buttons: Reload, Fullscreen, Open in new tab, Open in new window, Share -->

                <div class="icnbtn" onclick="reload()">
                    <span class="material-symbols-rounded"> refresh </span>
                </div>
                <div class="icnbtn" onclick="fullscreen()">
                    <span class="material-symbols-rounded"> fullscreen </span>
                </div>
                <div class="icnbtn" onclick="opennewtab()">
                    <span class="material-symbols-rounded"> tab </span>
                </div>
                <div class="icnbtn" onclick="opennewwindow()">
                    <span class="material-symbols-rounded"> select_window </span>
                </div>
                <div class="icnbtn" onclick="share()">
                    <span class="material-symbols-rounded"> share </span>
                </div>
                <div class="icnbtn" onclick="copy()">
                    <span class="material-symbols-rounded"> content_copy </span>
                </div>

            </div>
        </div>
    </div>

    <script src="../js-yaml.js"></script>
    <script src="script.js"></script>
</body>

</html>
