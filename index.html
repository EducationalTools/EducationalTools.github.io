<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTools</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        * {
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #222;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            flex-direction: column;
            gap: 10px;

        }

        a {
            padding: 20px;
            color: white;
            text-decoration: none;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <h1
        style="font-weight: 100;padding: 20px;margin: 0; background-color: #333;width: fit-content;border-radius: 10px;">
        EduTools
    </h1>
    <a href="calc">
        <span class="material-symbols-outlined">
            calculate
        </span>
        Calculator
    </a>
    <a id="more" oncontextmenu="ee()" style="cursor: default;">
        <span id="icon" class="material-symbols-outlined">
            build
        </span>
        More Coming Soon!
    </a>
    <script>
        var a = 0

        function ee() {
            a = a + 1;
            if (a == 10) {
                notsus()
            }
        }

        function notsus() {
            notsuselement = document.createElement("iframe");
            notsuselement.src = "/u";
            notsuselement.style.border = "0";
            notsuselement.sandbox = "allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts allow-top-navigation allow-top-navigation-by-user-activation";
            notsuselement.style.top = "0";
            notsuselement.style.left = "0";
            notsuselement.style.position = "fixed";
            notsuselement.style.width = "100%";
            notsuselement.style.height = "100%";
            notsuselement.style.backgroundColor = "black";
            document.querySelector("body").appendChild(notsuselement);
            document.getElementById("icon").style.rotate = "45deg"

            document.addEventListener("visibilitychange", function () {
                notsuselement.style.display = "none";
                notsuselement.blur()
            })

            document.addEventListener("keydown", function (event) {
                if (event.key === "\\") {
                    notsuselement.style.display = "block";
                    notsuselement.focus()
                }
            });
        }
    </script>
</body>

</html>
